<!DOCTYPE html>
<html>
<head>
  <title>XT-Kryptos Icon Generator</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e8e8e8; }
    canvas { border: 1px solid #333; margin: 10px; }
    a { color: #4a6cf7; }
    .row { display: flex; align-items: center; gap: 20px; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>XT-Kryptos Icon Generator</h2>
  <p>Right-click each canvas and "Save image as..." to save the icons.</p>
  <div class="row">
    <div><p>16x16</p><canvas id="c16" width="16" height="16"></canvas></div>
    <div><p>48x48</p><canvas id="c48" width="48" height="48"></canvas></div>
    <div><p>128x128</p><canvas id="c128" width="128" height="128"></canvas></div>
  </div>
  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;
      
      // Background
      ctx.fillStyle = '#0d0f14';
      ctx.fillRect(0, 0, s, s);
      
      // Rounded background
      const r = s * 0.15;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#151820';
      ctx.fill();
      
      // Lock body
      const lockW = s * 0.5;
      const lockH = s * 0.35;
      const lockX = (s - lockW) / 2;
      const lockY = s * 0.45;
      const lockR = s * 0.06;
      
      ctx.beginPath();
      ctx.moveTo(lockX + lockR, lockY);
      ctx.lineTo(lockX + lockW - lockR, lockY);
      ctx.quadraticCurveTo(lockX + lockW, lockY, lockX + lockW, lockY + lockR);
      ctx.lineTo(lockX + lockW, lockY + lockH - lockR);
      ctx.quadraticCurveTo(lockX + lockW, lockY + lockH, lockX + lockW - lockR, lockY + lockH);
      ctx.lineTo(lockX + lockR, lockY + lockH);
      ctx.quadraticCurveTo(lockX, lockY + lockH, lockX, lockY + lockH - lockR);
      ctx.lineTo(lockX, lockY + lockR);
      ctx.quadraticCurveTo(lockX, lockY, lockX + lockR, lockY);
      ctx.closePath();
      ctx.fillStyle = '#4a6cf7';
      ctx.fill();
      
      // Lock shackle
      const shackleW = s * 0.3;
      const shackleX = (s - shackleW) / 2;
      const shackleY = lockY;
      const shackleH = s * 0.22;
      
      ctx.beginPath();
      ctx.arc(s / 2, shackleY, shackleW / 2, Math.PI, 0, false);
      ctx.lineWidth = Math.max(s * 0.06, 1.5);
      ctx.strokeStyle = '#4a6cf7';
      ctx.stroke();
      
      // Keyhole
      const khR = s * 0.05;
      ctx.beginPath();
      ctx.arc(s / 2, lockY + lockH * 0.4, khR, 0, Math.PI * 2);
      ctx.fillStyle = '#151820';
      ctx.fill();
      
      // Keyhole stem
      ctx.beginPath();
      ctx.moveTo(s / 2 - khR * 0.5, lockY + lockH * 0.4 + khR);
      ctx.lineTo(s / 2 + khR * 0.5, lockY + lockH * 0.4 + khR);
      ctx.lineTo(s / 2 + khR * 0.3, lockY + lockH * 0.75);
      ctx.lineTo(s / 2 - khR * 0.3, lockY + lockH * 0.75);
      ctx.closePath();
      ctx.fill();
    }
    
    drawIcon(document.getElementById('c16'));
    drawIcon(document.getElementById('c48'));
    drawIcon(document.getElementById('c128'));
  </script>
</body>
</html>
